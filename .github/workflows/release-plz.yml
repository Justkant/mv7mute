name: Release-plz

on:
  push:
    branches:
      - main

jobs:
  release-plz-release:
    name: Release-plz release
    if: ${{ github.repository_owner == 'Justkant' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Linux system dependencies
        run: sudo apt-get update && sudo apt-get install --yes pkg-config libudev-dev libgtk-3-dev libxdo-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable

      - name: Require release token
        env:
          RELEASE_PLZ_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
        run: |
          if [ -z "$RELEASE_PLZ_TOKEN" ]; then
            echo "RELEASE_PLZ_TOKEN is required so tags created by release-plz trigger the release workflow." >&2
            exit 1
          fi

      - name: Run release-plz release
        uses: release-plz/action@1528104d2ca23787631a1c1f022abb64b34c1e11
        with:
          command: release
          version: 0.3.157
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}

  release-plz-pr:
    name: Release-plz PR
    if: ${{ github.repository_owner == 'Justkant' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Linux system dependencies
        run: sudo apt-get update && sudo apt-get install --yes pkg-config libudev-dev libgtk-3-dev libxdo-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable

      - name: Run release-plz release-pr
        uses: release-plz/action@1528104d2ca23787631a1c1f022abb64b34c1e11
        with:
          command: release-pr
          version: 0.3.157
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
