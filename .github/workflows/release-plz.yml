name: Release-plz

on:
  push:
    branches:
      - main

jobs:
  release-plz-release:
    name: Release-plz release
    if: ${{ github.repository_owner == 'Justkant' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      pull-requests: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Linux system dependencies
        run: sudo apt-get update && sudo apt-get install --yes pkg-config libudev-dev libgtk-3-dev libxdo-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable

      - name: Require release token
        env:
          RELEASE_PLZ_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
        run: |
          if [ -z "$RELEASE_PLZ_TOKEN" ]; then
            echo "RELEASE_PLZ_TOKEN is required so tags created by release-plz trigger the release workflow." >&2
            exit 1
          fi

      - name: Run release-plz release
        uses: release-plz/action@1528104d2ca23787631a1c1f022abb64b34c1e11
        with:
          command: release
          version: 0.3.157
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}

  release-plz-pr:
    name: Release-plz PR
    needs:
      - release-plz-release
    if: ${{ always() && github.repository_owner == 'Justkant' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Detect release tag created for this commit
        id: head-release-tag
        shell: bash
        run: |
          git fetch --force --tags origin
          if git tag --points-at "$GITHUB_SHA" | grep -Eq '^(v[0-9]|mv7mute-core-v[0-9])'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip release PR when this push already produced a release tag
        if: steps.head-release-tag.outputs.skip == 'true'
        run: echo "Release tags already point at $GITHUB_SHA; skipping release-pr for this push."

      - name: Install Linux system dependencies
        if: steps.head-release-tag.outputs.skip != 'true'
        run: sudo apt-get update && sudo apt-get install --yes pkg-config libudev-dev libgtk-3-dev libxdo-dev

      - name: Install Rust toolchain
        if: steps.head-release-tag.outputs.skip != 'true'
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable

      - name: Run release-plz release-pr
        if: steps.head-release-tag.outputs.skip != 'true'
        uses: release-plz/action@1528104d2ca23787631a1c1f022abb64b34c1e11
        with:
          command: release-pr
          version: 0.3.157
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
