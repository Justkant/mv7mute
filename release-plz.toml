[workspace]
git_only = true
publish = false
release_always = false
changelog_path = "CHANGELOG.md"
repo_url = "https://github.com/Justkant/mv7mute"
pr_labels = ["release"]
git_tag_name = "{{ package }}-v{{ version }}"

[[package]]
name = "mv7mute"
git_release_enable = false
publish = false

[[package]]
name = "mv7mute-core"
git_release_enable = false
publish = false

[[package]]
name = "mv7mute-tray"
git_release_enable = false
publish = false
