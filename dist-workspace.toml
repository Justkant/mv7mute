[workspace]
members = ["cargo:./"]

[dist]
cargo-dist-version = "0.31.0"
ci = ["github"]
packages = ["mv7mute", "mv7mute-tray"]
installers = ["shell", "powershell", "msi"]
targets = [
  "x86_64-pc-windows-msvc",
  "x86_64-apple-darwin",
  "aarch64-apple-darwin",
  "x86_64-unknown-linux-gnu",
]
pr-run-mode = "plan"
create-release = true
github-release = "announce"
install-path = "CARGO_HOME"
